# ============================================
# VOID Noir - Dark Purple Minimal
# ============================================

source = ~/.config/hypr/env.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/windowrules.conf

# ----------- General -----------
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 1
    col.active_border = rgba(7c3aedff) rgba(a855f7ff) 135deg
    col.inactive_border = rgba(1a1525aa)
    col.nogroup_border = rgba(7c3aed66)
    layout = dwindle
    allow_tearing = false
    resize_on_border = true
}

# ----------- Decoration -----------
decoration {
    rounding = 6

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
        xray = false
        noise = 0.02
    }

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(7c3aed44)
    }

    dim_inactive = false
}

# ----------- Dwindle -----------
dwindle {
    preserve_split = true
    force_split = 2
    smart_split = false
    smart_resizing = true
}

# ----------- Misc -----------
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    middle_click_paste = false
}

# ----------- Layouts -----------
master {
    new_status = master
    new_on_top = true
}

# ----------- Startup -----------
exec-once = hyprpaper
exec-once = waybar
exec-once = mako
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = wl-paste --type text --watch makoctl append
exec-once = wl-paste --type image --watch makoctl append

# ----------- Cursor -----------
env = HYPRCURSOR_SIZE, 24
env = XCURSOR_SIZE, 24
env = XCURSOR_THEME, breeze_cursors
