# ============================================
# Window Rules (Hyprland 0.55+ block syntax)
# ============================================

# Floating windows
windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol)$
    float = true
}

windowrule {
    name = float-nm-editor
    match:class = ^(nm-connection-editor)$
    float = true
}

windowrule {
    name = float-blueman
    match:class = ^(blueman-manager)$
    float = true
}

windowrule {
    name = float-thunar-progress
    match:class = ^(thunar)$
    match:title = ^(File Operation Progress)$
    float = true
}

windowrule {
    name = float-calculator
    match:class = ^(org.gnome.Calculator)$
    float = true
}

windowrule {
    name = float-settings
    match:class = ^(org.gnome.Settings)$
    float = true
}

windowrule {
    name = float-qt5ct
    match:class = ^(qt5ct)$
    float = true
}

windowrule {
    name = float-nwg-look
    match:class = ^(nwg-look)$
    float = true
}

windowrule {
    name = float-pip
    match:title = ^(Picture-in-Picture)$
    float = true
}

windowrule {
    name = float-open-file
    match:title = ^(Open File)$
    float = true
}

windowrule {
    name = float-save-as
    match:title = ^(Save As)$
    float = true
}

windowrule {
    name = float-confirm
    match:title = ^(Confirm)$
    float = true
}

windowrule {
    name = float-file-transfer
    match:title = ^(File Transfer)$
    float = true
}

windowrule {
    name = float-preferences
    match:title = ^(Preferences)$
    float = true
}

windowrule {
    name = float-title-settings
    match:title = ^(Settings)$
    float = true
}

windowrule {
    name = float-auth
    match:title = ^(Authentication Required)$
    float = true
}

# Size rules
windowrule {
    name = size-pavucontrol
    match:class = ^(pavucontrol)$
    size = 800 600
}

windowrule {
    name = size-blueman
    match:class = ^(blueman-manager)$
    size = 600 400
}

# Opacity
windowrule {
    name = opacity-ghostty
    match:class = ^(ghostty)$
    opacity = 0.95 0.90
}

windowrule {
    name = opacity-chromium
    match:class = ^(chromium)$
    opacity = 0.92 0.88
}

windowrule {
    name = opacity-firefox
    match:class = ^(firefox)$
    opacity = 0.92 0.88
}

windowrule {
    name = opacity-thunar
    match:class = ^(thunar)$
    opacity = 0.95 0.90
}

# Workspace assignments
windowrule {
    name = ws-chromium
    match:class = ^(chromium)$
    workspace = 1
}

windowrule {
    name = ws-firefox
    match:class = ^(firefox)$
    workspace = 1
}

windowrule {
    name = ws-ghostty
    match:class = ^(ghostty)$
    workspace = 2
}

windowrule {
    name = ws-discord
    match:class = ^(discord)$
    workspace = 3
}

windowrule {
    name = ws-spotify
    match:class = ^(Spotify|spotify)$
    workspace = 5
}

# Layer rules
layerrule {
    name = blur-waybar
    match:namespace = waybar
    blur = true
}

layerrule {
    name = blur-fuzzel
    match:namespace = fuzzel
    blur = true
}

layerrule {
    name = blur-mako
    match:namespace = mako
    blur = true
}
