# ============================================
# Hyprlock - Void Noir
# ============================================

background {
    monitor =
    path = screenshot
    blur_passes = 5
    blur_size = 10
    brightness = 0.55
    contrast = 0.85
    vibrancy = 0.15
}

input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(7c3aedcc)
    inner_color = rgba(1e1e2eaa)
    font_color = rgba(c9d1d9ff)
    fade_on_empty = false
    placeholder_text = <span foreground="##6e7681">  enter password...</span>
    hide_input = false
    position = 0, -140
    halign = center
    valign = center
    rounding = 10
    check_color = rgba(7c3aedcc)
    fail_color = rgba(f38ba8cc)
    fail_text = <span foreground="##f38ba8">wrong password</span>
    fail_transition = 300
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M")"
    color = rgba(c9d1d9ff)
    font_size = 80
    font_family = CaskaydiaCove Nerd Font Thin
    position = 0, 100
    halign = center
    valign = center
}

# AM/PM
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%p")"
    color = rgba(7c3aedcc)
    font_size = 20
    font_family = CaskaydiaCove Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(c9d1d9aa)
    font_size = 16
    font_family = CaskaydiaCove Nerd Font
    position = 0, 10
    halign = center
    valign = center
}

# Status indicator
label {
    monitor =
    text = 🔒
    color = rgba(7c3aedcc)
    font_size = 20
    position = 0, -200
    halign = center
    valign = center
}
